<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>People Counter — Real-time Webcam AI</title>
<meta name="description" content="Count people in your webcam feed in real-time using TensorFlow.js and COCO-SSD." />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' };
</script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
  :root {
    --bg: #0b0f1a;
    --card: #131a2b;
    --border: #1f2940;
    --fg: #e6eaf2;
    --muted: #8a93a6;
    --primary: #6aa9ff;
    --danger: #ff6b6b;
  }
  html, body { background: var(--bg); color: var(--fg); }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .card { background: var(--card); border: 1px solid var(--border); }
  .text-muted { color: var(--muted); }
  .text-primary { color: var(--primary); }
  .bg-primary { background: var(--primary); color: #0b0f1a; }
  .border-default { border-color: var(--border); }
  .text-danger { color: var(--danger); }

  @keyframes counter-pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); filter: drop-shadow(0 0 24px rgba(106,169,255,0.6)); }
    100% { transform: scale(1); }
  }
  .animate-counter-pulse { animation: counter-pulse 0.5s ease-out; }

  .video-wrap { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 1.5rem; overflow: hidden; }
  .video-wrap video, .video-wrap canvas {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .mirror { transform: scaleX(-1); }
  .spinner {
    width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    border-radius: 9999px; padding: 0.625rem 1.5rem; font-size: 0.875rem; font-weight: 500;
    transition: opacity 0.15s, background 0.15s;
    cursor: pointer;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #0b0f1a; border: none; }
  .btn-primary:not(:disabled):hover { opacity: 0.9; }
  .btn-ghost { background: var(--card); color: var(--fg); border: 1px solid var(--border); }
  .btn-ghost:not(:disabled):hover { background: #1c2540; }
</style>
</head>
<body class="min-h-screen">
  <main class="min-h-screen flex flex-col items-center px-4 py-10">
    <div class="w-full max-w-3xl flex flex-col items-center gap-6">
      <div class="text-center">
        <h1 class="text-sm uppercase tracking-[0.2em] text-muted mb-3">Real-time vision</h1>
        <div id="counterCard" class="inline-flex items-center gap-3 rounded-2xl card px-8 py-5 shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <div class="text-left">
            <div class="text-xs uppercase tracking-wider text-muted">People in frame</div>
            <div id="count" class="text-5xl font-bold leading-none mt-1" style="font-variant-numeric: tabular-nums;">0</div>
          </div>
        </div>
      </div>

      <div class="video-wrap card">
        <div id="loadingOverlay" class="absolute inset-0 z-20 flex flex-col items-center justify-center gap-3" style="background: rgba(19,26,43,0.9); backdrop-filter: blur(4px);">
          <div class="spinner"></div>
          <p class="text-sm text-muted">Loading AI Model…</p>
        </div>
        <div id="offOverlay" class="absolute inset-0 z-10 hidden flex-col items-center justify-center gap-2 text-muted">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h3l1.83-2.74A2 2 0 0 1 9.5 1.5h5"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          <p class="text-sm">Camera is off</p>
        </div>
        <div id="errorOverlay" class="absolute inset-0 z-30 hidden flex-col items-center justify-center gap-3 px-6 text-center" style="background: rgba(19,26,43,0.95);">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-danger"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p id="errorMsg" class="text-sm max-w-sm"></p>
        </div>
        <video id="video" class="mirror" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
      </div>

      <div class="flex gap-3">
        <button id="startBtn" class="btn btn-primary" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Start Camera
        </button>
        <button id="stopBtn" class="btn btn-ghost" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h3l1.83-2.74A2 2 0 0 1 9.5 1.5h5"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          Stop Camera
        </button>
      </div>

      <p class="text-xs text-muted text-center max-w-md">
        Powered by TensorFlow.js &amp; COCO-SSD. All processing happens locally in your browser — no video leaves your device.
      </p>
    </div>
  </main>

<script>
(async () => {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const countEl = document.getElementById('count');
  const counterCard = document.getElementById('counterCard');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const offOverlay = document.getElementById('offOverlay');
  const errorOverlay = document.getElementById('errorOverlay');
  const errorMsg = document.getElementById('errorMsg');

  let model = null;
  let stream = null;
  let raf = null;
  let prevCount = 0;
  let running = false;

  const show = (el, on) => {
    el.classList.toggle('hidden', !on);
    el.classList.toggle('flex', on);
  };
  show(offOverlay, false);
  show(errorOverlay, false);
  video.style.display = 'none';
  canvas.style.display = 'none';

  const showError = (msg) => {
    errorMsg.textContent = msg;
    show(errorOverlay, true);
  };

  try {
    await tf.ready();
    model = await cocoSsd.load();
    show(loadingOverlay, false);
    show(offOverlay, true);
    startBtn.disabled = false;
  } catch (e) {
    console.error(e);
    show(loadingOverlay, false);
    showError('Failed to load AI model.');
  }

  const detect = async () => {
    if (!running || video.readyState !== 4) {
      raf = requestAnimationFrame(detect);
      return;
    }
    const w = video.videoWidth, h = video.videoHeight;
    if (canvas.width !== w) canvas.width = w;
    if (canvas.height !== h) canvas.height = h;

    const predictions = await model.detect(video);
    const people = predictions.filter(p => p.class === 'person');

    ctx.clearRect(0, 0, w, h);
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#6aa9ff';
    ctx.font = '16px ui-sans-serif, system-ui';
    people.forEach(p => {
      const [x, y, bw, bh] = p.bbox;
      ctx.strokeStyle = '#6aa9ff';
      ctx.strokeRect(x, y, bw, bh);
      const label = `Person ${(p.score * 100).toFixed(0)}%`;
      const tw = ctx.measureText(label).width + 10;
      ctx.fillStyle = '#6aa9ff';
      ctx.fillRect(x, y - 22, tw, 22);
      ctx.fillStyle = '#0b0f1a';
      ctx.fillText(label, x + 5, y - 6);
    });

    if (people.length !== prevCount) {
      prevCount = people.length;
      countEl.textContent = people.length;
      counterCard.classList.remove('animate-counter-pulse');
      void counterCard.offsetWidth;
      counterCard.classList.add('animate-counter-pulse');
    }

    raf = requestAnimationFrame(detect);
  };

  startBtn.addEventListener('click', async () => {
    show(errorOverlay, false);
    show(offOverlay, false);
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
      video.srcObject = stream;
      await video.play();
      video.style.display = 'block';
      canvas.style.display = 'block';
      canvas.classList.add('mirror');
      running = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      raf = requestAnimationFrame(detect);
    } catch (err) {
      console.error(err);
      const msg = err.name === 'NotAllowedError'
        ? 'Camera permission denied. Please allow access in your browser settings.'
        : err.name === 'NotFoundError'
          ? 'No webcam detected on this device.'
          : err.message || 'Could not access the camera.';
      showError(msg);
    }
  });

  stopBtn.addEventListener('click', () => {
    running = false;
    if (raf) cancelAnimationFrame(raf);
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;
    video.srcObject = null;
    video.style.display = 'none';
    canvas.style.display = 'none';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    prevCount = 0;
    countEl.textContent = '0';
    startBtn.disabled = false;
    stopBtn.disabled = true;
    show(offOverlay, true);
  });
})();
</script>
</body>
</html>
